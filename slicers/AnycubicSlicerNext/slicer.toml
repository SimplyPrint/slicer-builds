schema_version = 1
name = "AnycubicSlicerNext"
repository = "https://github.com/ANYCUBIC-3D/AnycubicSlicerNext.git"
default_ref = "HEAD"
family = "orca"
executable = "orca-slicer"
architectures = ["x86-64"]
backend_engine = "OrcaSlicer"
backend_supported = false

[capabilities]
binary = true
config_dump = true
thumbnail = true

[patches]
shared = [
    "cli-thumbnail-glew-glx",
    "cli-thumbnail-orca-legacy",
    "cli-thumbnail-orca-opengl-version",
]

[ci.binary]
enabled = false
publish = false
release = "none"
nightly = true

[ci.config]
enabled = false
publish = false
release = "none"
nightly = true

[test]
contract = "bambu"
profile_source = "bundle-resources"
profile_root = "profiles/Anycubic"
machine_profile = "machine/Anycubic Kobra 3 0.4 nozzle.json"
filament_profile = "filament/Anycubic PLA @Anycubic Kobra 3 0.4 nozzle.json"
process_profile = "process/0.20mm Standard @Anycubic Kobra 3 0.4 nozzle.json"
# The compatibility adapter adds --logfile for Orca 2.4+/nightly, but this
# vendor fork's current CLI does not expose that option.
backend_version = "2.3.2"
