schema_version = 1
name = "Cura"
repository = "https://github.com/Ultimaker/CuraEngine.git"
family = "cura"
executable = "CuraEngine"
architectures = ["x86-64"]

[capabilities]
binary = true
config_dump = true
thumbnail = false

[ci.binary]
enabled = true
publish = true
release = "latest"
release_repository = "https://github.com/Ultimaker/Cura.git"
nightly = false

[ci.config]
enabled = true
publish = true
repository = "https://github.com/Ultimaker/Cura.git"
release = "latest"
nightly = false
generator_only = true

[build]
# Conan packages are shared through CONAN_HOME, but this generated toolchain is
# local to each managed checkout.
dependency_marker = "build/Release/generators/conan_toolchain.cmake"
dependency_inputs = ["steps/conan-env.sh"]
