schema_version = 1
name = "BambuStudio"
repository = "https://github.com/bambulab/BambuStudio.git"
family = "bambu"
executable = "bambu-studio"
architectures = ["x86-64", "arm64"]

[capabilities]
binary = true
config_dump = true
thumbnail = true

[patches]
shared = ["cli-thumbnail-glew-glx"]

[ci.binary]
enabled = true
publish = true
release = "latest"
nightly = true

[ci.config]
enabled = true
publish = true
release = "latest"
nightly = true
