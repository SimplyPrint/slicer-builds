name: Build Slicer Binaries

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      runner:
        type: choice
        options:
          - ubuntu-24.04
          - ubicloud-standard-16-ubuntu-2404
          - ubicloud-standard-30-ubuntu-2404
        default: ubuntu-24.04
        description: The runner for this action
        required: true

      runner-arm:
        type: choice
        options:
          - ubuntu-24.04-arm
          - ubicloud-standard-16-arm-ubuntu-2404
          - ubicloud-standard-30-arm-ubuntu-2404
        default: ubuntu-24.04-arm
        description: The ARM runner for this action
        required: true

      slicer:
        type: choice
        options:
          - all
          - OrcaSlicer
          - PrusaSlicer
          - BambuStudio
          - ElegooSlicer
          - CrealityPrint
          - Cura
        default: all
        description: Slicer to build
        required: true

      build-type:
        type: choice
        options:
          - all
          - nightly
          - latest_release
        default: all
        description: Build type to run
        required: true

      release-tag:
        type: string
        default: ''
        description: Optional release tag override for testing one version
        required: false

      arch:
        type: choice
        options:
          - x86-64
          - arm64
          - all
        default: x86-64
        description: Architecture to build
        required: true

      disable-caching:
        type: boolean
        default: false
        description: Disable caching

      force-rebuild:
        type: boolean
        default: false
        description: Force rebuild

permissions:
  contents: write

jobs:
  build_slicers:
    strategy:
      fail-fast: false
      matrix:
        slicer:
          - OrcaSlicer
          - PrusaSlicer
          - BambuStudio
          - ElegooSlicer
          - CrealityPrint
          - Cura
        build-type:
          - nightly
          - latest_release
        arch:
          - x86-64
          - arm64
        include:
          - slicer: OrcaSlicer
            repo: OrcaSlicer/OrcaSlicer
            use_arm: true
#          - slicer: PrusaSlicer
#            repo: prusa3d/PrusaSlicer
#            use_arm: true
          - slicer: BambuStudio
            repo: BambuLab/BambuStudio
            use_arm: true
          - slicer: PrusaSlicer
            repo: prusa3d/PrusaSlicer
            use_arm: false
          - slicer: ElegooSlicer
            repo: ELEGOO-3D/ElegooSlicer
            use_arm: false
          - slicer: CrealityPrint
            repo: CrealityOfficial/CrealityPrint
            use_arm: false
          - slicer: Cura
            repo: Ultimaker/CuraEngine
            always_run_build_deps: true
            deps_cache_path: .cura-conan-home/p
            index_metadata:
              executable: bin/CuraEngine
              resources_ref: 1fb8a7610460e03ec62da950d1c173a249b23b59
              resources_repo: Ultimaker/Cura
              settings_contract: cura-resolved-v1
            index_upstream_ref_metadata_key: engine_ref
            release_tag: 5.13.0
            pinned_release_ref: 636f9608621fd1d6c1b75ad2a969de53beabfbc6
            release_only: true
            runtime_smoke_script: slicers/Cura/tests/smoke-bundle.sh
            use_arm: false

    runs-on: ${{ matrix.arch == 'arm64' && matrix.use_arm && (inputs.arch == 'all' || inputs.arch == 'arm64') && (inputs.runner-arm || 'ubuntu-24.04-arm') || (inputs.runner || 'ubuntu-24.04') }}
    env:
      DEPS_CACHE_KEY: ''
      SLICER_CACHE_KEY: ''
      latest_release_tag: ''
      latest_release_at_head: 'false'
      continue_build: 'true'
      IS_ARM: ${{ matrix.arch == 'arm64' && 'true' || 'false' }}
      PLATFORM: linux
      ARCH: ${{ matrix.arch }}
    steps:
      - name: Apply dispatch filters
        run: |
          selected_slicer="${{ inputs.slicer || 'all' }}"
          selected_build_type="${{ inputs.build-type || 'all' }}"
          selected_arch="${{ inputs.arch || 'x86-64' }}"

          if [[ "$selected_slicer" != "all" && "$selected_slicer" != "${{ matrix.slicer }}" ]]; then
            echo "Skipping ${{ matrix.slicer }} because slicer filter is $selected_slicer."
            echo "continue_build=false" >> "$GITHUB_ENV"
            exit 0
          fi

          if [[ "$selected_build_type" != "all" && "$selected_build_type" != "${{ matrix.build-type }}" ]]; then
            echo "Skipping ${{ matrix.build-type }} because build-type filter is $selected_build_type."
            echo "continue_build=false" >> "$GITHUB_ENV"
            exit 0
          fi

          if [[ "$selected_arch" != "all" && "$selected_arch" != "${{ matrix.arch }}" ]]; then
            echo "Skipping ${{ matrix.arch }} because arch filter is $selected_arch."
            echo "continue_build=false" >> "$GITHUB_ENV"
            exit 0
          fi

          if [[ "${{ matrix.arch }}" == "arm64" && "${{ matrix.use_arm }}" != "true" ]]; then
            echo "Skipping ${{ matrix.slicer }} arm64 because it is not enabled for ARM builds."
            echo "continue_build=false" >> "$GITHUB_ENV"
            exit 0
          fi

          if [[ "${{ matrix.release_only }}" == "true" && "${{ matrix.build-type }}" != "latest_release" ]]; then
            echo "Skipping ${{ matrix.slicer }} nightly because this integration pins a coordinated stable release."
            echo "continue_build=false" >> "$GITHUB_ENV"
            exit 0
          fi

      - name: Checkout repository
        if: env.continue_build == 'true'
        uses: actions/checkout@v4

      - name: Setup
        if: env.continue_build == 'true'
        env:
          INDEX_METADATA_JSON: ${{ toJSON(matrix.index_metadata) }}
          INDEX_UPSTREAM_REF_METADATA_KEY: ${{ matrix.index_upstream_ref_metadata_key || '' }}
        run: |
          set -euo pipefail

          git clone https://github.com/${{ matrix.repo }} slicer-src --depth 1 --

          release_tag_override="${{ inputs.release-tag || matrix.release_tag || '' }}"

          i=5
          while (( i > 0 )); do
            if [[ -n "$release_tag_override" ]]; then
              latest_release_tag="$release_tag_override"
              latest_release_json=$(curl -fsSL "https://api.github.com/repos/${{ matrix.repo }}/releases/tags/${latest_release_tag}" || echo '{}')
            else
              latest_release_json=$(curl -fsSL "https://api.github.com/repos/${{ matrix.repo }}/releases/latest")
              latest_release_tag=$(echo "$latest_release_json" | jq -r '.tag_name')
            fi

            upstream_published_at=$(echo "$latest_release_json" | jq -r '.published_at // empty')
            latest_release_hash=$(curl -fsSL "https://api.github.com/repos/${{ matrix.repo }}/commits/refs/tags/${latest_release_tag}" | jq -r '.sha')
            head_hash=$(curl -fsSL "https://api.github.com/repos/${{ matrix.repo }}/commits/HEAD" | jq -r '.sha')
            latest_stored_tag=$(jq -r '.latest // empty' "slicers/${{ matrix.slicer }}/out/_index.json" 2>/dev/null || true)
            release_build_present=$(jq -r --arg tag "$latest_release_tag" --arg platform "${{ env.PLATFORM }}" --arg arch "${{ env.ARCH }}" 'any(.versions[$tag].builds[]?; .platform == $platform and .arch == $arch)' "slicers/${{ matrix.slicer }}/out/_index.json" 2>/dev/null || echo false)

            echo latest_release_tag=$latest_release_tag
            echo latest_release_hash=$latest_release_hash
            echo latest_stored_tag=$latest_stored_tag
            echo release_build_present=$release_build_present
            echo upstream_published_at=$upstream_published_at
            echo head_hash=$head_hash

            if [[ "$latest_release_tag" == "null" || "$latest_release_hash" == "null" || "$head_hash" == "null" ]]; then
              echo "Failed to get data from Github API. Retrying in 5 seconds..."
              ((--i))
              sleep 5
              continue
            fi
            break
          done

          if [[ $i == 0 ]]; then
            exit 1
          fi

          pinned_release_ref="${{ matrix.pinned_release_ref || '' }}"
          if [[ -n "$pinned_release_ref" && "$latest_release_hash" != "$pinned_release_ref" ]]; then
            echo "Tag $latest_release_tag resolved to $latest_release_hash, expected pinned ref $pinned_release_ref." >&2
            exit 1
          fi

          echo "latest_release_tag=$latest_release_tag" >> "$GITHUB_ENV"
          echo "latest_release_hash=$latest_release_hash" >> "$GITHUB_ENV"
          echo "upstream_published_at=$upstream_published_at" >> "$GITHUB_ENV"
          echo "head_hash=$head_hash" >> "$GITHUB_ENV"

          if [[ "$release_build_present" != "true" ]] || [[ "${{ inputs.force-rebuild || false }}" == "true" ]]; then
            git -C slicer-src fetch origin refs/tags/$latest_release_tag
            if [[ "$head_hash" == "$latest_release_hash" ]]; then
              echo "Latest release found at HEAD"
              latest_release_at_head=true
              echo "latest_release_at_head=true" >> "$GITHUB_ENV"
            fi
          elif [[ "${{ matrix.build-type }}" == "latest_release" ]]; then
            echo "The latest release has already been built. Exiting..."
            echo "continue_build=false" >> "$GITHUB_ENV"
            exit 0
          fi

          if [[ "${{ matrix.build-type }}" == "latest_release" ]] && [[ "${latest_release_at_head:-false}" == "true" ]] && [[ "${{ inputs.build-type || 'all' }}" != "latest_release" ]] && [[ "${{ matrix.release_only }}" != "true" ]]; then
            echo "The latest release is at the HEAD of the repo. The nightly build will generate the release files. Exiting..."
            echo "continue_build=false" >> "$GITHUB_ENV"
            exit 0
          fi

          mkdir -p slicer-out
          if [[ "${{ matrix.build-type }}" == "nightly" ]]; then
            build_ref_hash="$head_hash"
            version_dir="nightly"
          else
            build_ref_hash="$latest_release_hash"
            version_dir="$latest_release_tag"
          fi

          index_metadata_json="${INDEX_METADATA_JSON:-}"
          index_upstream_ref_metadata_key="${INDEX_UPSTREAM_REF_METADATA_KEY:-}"
          if [[ -z "$index_metadata_json" || "$index_metadata_json" == "null" ]]; then
            index_metadata_json='{}'
          fi
          jq -n \
            --argjson metadata "$index_metadata_json" \
            --arg ref_key "$index_upstream_ref_metadata_key" \
            --arg ref "$build_ref_hash" \
            '$metadata + (if $ref_key == "" then {} else {($ref_key): $ref} end)' \
            > slicer-out/index-metadata.json

          cat > slicer-out/config.sh <<EOF
          build_type=${{ matrix.build-type }}
          version_dir=$version_dir
          tag=$latest_release_tag
          slicer=${{ matrix.slicer }}
          repo=${{ matrix.repo }}
          latest_release_at_head=${latest_release_at_head:-false}
          upstream_ref=$build_ref_hash
          upstream_published_at=$upstream_published_at
          platform=${{ env.PLATFORM }}
          arch=${{ env.ARCH }}
          created_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          workflow_run_url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF

      - name: Finalize Setup
        if: env.continue_build == 'true'
        env:
          build_ref: ${{ matrix.build-type == 'latest_release' && 'FETCH_HEAD' || 'HEAD' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb zip

          git -C slicer-src checkout ${{ env.build_ref }}

      - name: Apply patches
        if: env.continue_build == 'true'
        run: |
          ./tools/apply_versioned_patches.sh "${{ matrix.slicer }}" "${{ matrix.build-type == 'nightly' && 'nightly' || env.latest_release_tag }}" binary

      - name: Install dependencies
        if: env.continue_build == 'true'
        run: |
          ./slicers/${{ matrix.slicer }}/steps/install-deps.sh

      - name: Get dependencies cache key
        if: env.continue_build == 'true'
        run: |
          cd slicer-src
          deps_cache_key=$(git log -1 --pretty="format:%H" -- deps)
          echo "DEPS_CACHE_KEY=${deps_cache_key:-$(git rev-parse HEAD)}" >> "$GITHUB_ENV"

      - name: Cache built dependencies
        if: env.continue_build == 'true' && !inputs.disable-caching
        id: cache-build-deps
        uses: actions/cache@v4
        with:
          path: ${{ matrix.deps_cache_path || 'slicer-src/deps/build' }}
          key: ${{ runner.os }}-${{ matrix.slicer }}-${{ env.ARCH }}-build-deps-${{ env.DEPS_CACHE_KEY }}-${{ hashFiles(format('slicers/{0}/steps/build-deps.sh', matrix.slicer), format('slicers/{0}/conan.lock', matrix.slicer), format('slicers/{0}/version.env', matrix.slicer)) }}

      - name: Build dependencies
        if: env.continue_build == 'true' && (matrix.always_run_build_deps || inputs.disable-caching || steps.cache-build-deps.outputs.cache-hit != 'true')
        run: |
          ./slicers/${{ matrix.slicer }}/steps/build-deps.sh

      - name: Get slicer cache key
        if: env.continue_build == 'true'
        run: |
          cd slicer-src
          SLICER_CACHE_KEY=$(git log -1 --pretty="format:%H" -- src)

          ALL_DIR="../slicers/${{ matrix.slicer }}/patches/binary/all"
          VER_DIR="../slicers/${{ matrix.slicer }}/patches/binary/${{ matrix.build-type == 'nightly' && 'nightly' || env.latest_release_tag }}"
          PATCH_FILES=$( { [[ -d "$ALL_DIR" ]] && find "$ALL_DIR" -name '*.patch' -type f; [[ -d "$VER_DIR" ]] && find "$VER_DIR" -name '*.patch' -type f; } | sort )

          if [[ -n "$PATCH_FILES" ]]; then
            PATCHES_HASH=$(echo "$PATCH_FILES" | xargs cat | sha256sum | cut -d' ' -f1)
            SLICER_CACHE_KEY="${SLICER_CACHE_KEY}-${PATCHES_HASH}"
          fi

          INTEGRATION_FILES=$(find "../slicers/${{ matrix.slicer }}/steps" -type f | sort)
          for optional_file in \
            "../slicers/${{ matrix.slicer }}/version.env" \
            "../slicers/${{ matrix.slicer }}/conan.lock"; do
            if [[ -f "$optional_file" ]]; then
              INTEGRATION_FILES+=$'\n'"$optional_file"
            fi
          done
          INTEGRATION_HASH=$(echo "$INTEGRATION_FILES" | xargs cat | sha256sum | cut -d' ' -f1)
          SLICER_CACHE_KEY="${SLICER_CACHE_KEY}-${INTEGRATION_HASH}"

          echo "SLICER_CACHE_KEY=${SLICER_CACHE_KEY}" >> $GITHUB_ENV

      - name: Cache built slicer
        if: env.continue_build == 'true' && !inputs.disable-caching
        id: cache-build-slicer
        uses: actions/cache@v4
        with:
          path: slicer-src/build
          key: ${{ runner.os }}-${{ matrix.slicer }}-${{ env.ARCH }}-build-slicer-${{ env.SLICER_CACHE_KEY }}

      - name: Build slicer
        if: env.continue_build == 'true' && (inputs.force-rebuild || inputs.disable-caching || steps.cache-build-slicer.outputs.cache-hit != 'true')
        run: |
          ./slicers/${{ matrix.slicer }}/steps/build.sh

      - name: Package binaries
        if: env.continue_build == 'true'
        run: |
          ./slicers/${{ matrix.slicer }}/steps/package-binary.sh
          cd slicer-src/build/slicer_out
          zip -r ../binary.zip *
          cd ../../..

          release_asset_name="${{ matrix.slicer }}-${{ env.latest_release_tag }}-${{ env.PLATFORM }}-${{ env.ARCH }}.zip"
          nightly_asset_name="${{ matrix.slicer }}-${{ env.PLATFORM }}-${{ env.ARCH }}-nightly.zip"
          mv slicer-src/build/binary.zip "slicer-out/${release_asset_name}"
          sha256=$(sha256sum "slicer-out/${release_asset_name}" | cut -d' ' -f1)

          cat >> slicer-out/config.sh <<EOF
          sha256=$sha256
          release_asset_name=$release_asset_name
          nightly_asset_name=$nightly_asset_name
          release_url=https://github.com/${{ github.repository }}/releases/download/${{ matrix.slicer }}_${{ env.latest_release_tag }}/${release_asset_name}
          nightly_url=https://github.com/${{ github.repository }}/releases/download/nightly/${nightly_asset_name}
          EOF

      - name: Smoke bundle in a clean runtime
        if: env.continue_build == 'true' && matrix.runtime_smoke_script
        env:
          RUNTIME_SMOKE_SCRIPT: ${{ matrix.runtime_smoke_script }}
        run: |
          docker run --rm \
            --env RUNTIME_SMOKE_SCRIPT \
            --volume "$PWD/slicer-src/build/slicer_out:/workspace/bundle:ro" \
            --volume "$PWD:/workspace/repository:ro" \
            ubuntu:24.04 \
            bash -euc '
              export DEBIAN_FRONTEND=noninteractive TZ=Etc/UTC
              apt-get update
              apt-get install -y --no-install-recommends ca-certificates python3
              "/workspace/repository/${RUNTIME_SMOKE_SCRIPT}" /workspace/bundle
            '

      - name: Upload latest release
        if: env.continue_build == 'true' && (matrix.build-type == 'latest_release' || env.latest_release_at_head == 'true')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ matrix.slicer }} ${{ env.latest_release_tag }}
          files: slicer-out/${{ matrix.slicer }}-${{ env.latest_release_tag }}-${{ env.PLATFORM }}-${{ env.ARCH }}.zip
          tag_name: ${{ matrix.slicer }}_${{ env.latest_release_tag }}
          target_commitish: ${{ github.ref_name }}
          body: "Link to workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          make_latest: false

      - name: Upload nightly release
        if: env.continue_build == 'true' && matrix.build-type == 'nightly'
        uses: WebFreak001/deploy-nightly@v3.2.0
        with:
          upload_url: https://uploads.github.com/repos/SimplyPrint/slicer-builds/releases/254161481/assets{?name,label}
          release_id: 254161481
          asset_path: slicer-out/${{ matrix.slicer }}-${{ env.latest_release_tag }}-${{ env.PLATFORM }}-${{ env.ARCH }}.zip
          asset_name: ${{ matrix.slicer }}-${{ env.PLATFORM }}-${{ env.ARCH }}-nightly.zip
          asset_content_type: application/zip
          max_releases: 1

      - name: Upload config file
        if: env.continue_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: binary-config-${{ matrix.slicer }}-${{ matrix.build-type }}-${{ env.ARCH }}
          path: |
            slicer-out/config.sh
            slicer-out/index-metadata.json

  update_index:
    needs: build_slicers
    runs-on: ubuntu-24.04
    if: success() || failure()
    outputs:
      nightly_indexed: ${{ steps.update-build-index.outputs.nightly_indexed }}
    concurrency:
      group: slicer-out-${{ github.ref_name }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Update build index
        id: update-build-index
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          for folder in artifacts/binary-config-*; do
            [[ -d "$folder" ]] || continue
            echo "Begin processing $folder"
            source "$folder/config.sh"

            metadata_args=()
            while IFS= read -r item; do
              metadata_args+=(--metadata "$item")
            done < <(
              jq -r 'to_entries[] | "\(.key)=\(.value | tostring)"' \
                "$folder/index-metadata.json"
            )

            if [[ "$build_type" == "nightly" ]]; then
              asset_name="$nightly_asset_name"
              asset_url="$nightly_url"
            else
              asset_name="$release_asset_name"
              asset_url="$release_url"
            fi

            ./tools/update_slicer_index.py \
              --index "slicers/$slicer/out/_index.json" \
              --version "$version_dir" \
              --kind build \
              --platform "$platform" \
              --arch "$arch" \
              --sha256 "$sha256" \
              --url "$asset_url" \
              --asset-name "$asset_name" \
              --created-at "$created_at" \
              --upstream-ref "$upstream_ref" \
              --upstream-published-at "$upstream_published_at" \
              --source-repo "$repo" \
              --workflow-run-url "$workflow_run_url" \
              "${metadata_args[@]}" \
              $([[ "$version_dir" != "nightly" ]] && echo --latest)

            if [[ "$build_type" == "nightly" && "$latest_release_at_head" == "true" ]]; then
              ./tools/update_slicer_index.py \
                --index "slicers/$slicer/out/_index.json" \
                --version "$tag" \
                --latest \
                --kind build \
                --platform "$platform" \
                --arch "$arch" \
                --sha256 "$sha256" \
                --url "$release_url" \
                --asset-name "$release_asset_name" \
                --created-at "$created_at" \
                --upstream-ref "$upstream_ref" \
                --upstream-published-at "$upstream_published_at" \
                --source-repo "$repo" \
                --workflow-run-url "$workflow_run_url" \
                "${metadata_args[@]}"
            fi

            if [[ "$build_type" == "nightly" ]]; then
              echo "nightly_indexed=true" >> "$GITHUB_OUTPUT"
            fi

            git add "slicers/$slicer/out/_index.json"
            if git diff --cached --quiet; then
              echo "No build index changes for $slicer $version_dir $arch."
            else
              git commit -m "chore(${slicer,,}): index ${platform}/${arch} build of ${version_dir} @ ${upstream_ref:0:12}"
            fi
          done

          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

  update_nightly_tag:
    needs: update_index
    if: always() && needs.update_index.result == 'success' && needs.update_index.outputs.nightly_indexed == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Update nightly tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "nightly"
          git push --force --tags origin
