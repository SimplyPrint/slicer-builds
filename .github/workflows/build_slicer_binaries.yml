name: Build Slicer Binaries

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      slicer:
        type: string
        default: all
        description: Slicer manifest name, or all
        required: true

      build-type:
        type: choice
        options:
          - consumer
          - all
          - nightly
          - latest_release
        default: consumer
        description: Consumer rebuild, or a regular latest/nightly build
        required: true

      release-tag:
        type: string
        default: ''
        description: Optional release tag override for testing one version
        required: false

      arch:
        type: choice
        options:
          - x86-64
          - arm64
          - all
        default: x86-64
        description: Architecture to build
        required: true

      disable-caching:
        type: boolean
        default: false
        description: Disable caching

      force-rebuild:
        type: boolean
        default: false
        description: Force rebuild

permissions:
  contents: write

# The nightly asset has one shared name. Keep upload and index publication from
# separate workflow runs in one transaction so the indexed digest cannot race
# a later run's replacement asset. Matrix jobs within a run remain parallel.
concurrency:
  group: slicer-binaries-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare_matrix:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
      has_publish: ${{ steps.generate.outputs.has_publish }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate validated binary matrix
        id: generate
        env:
          SELECTED_SLICER: ${{ inputs.slicer || 'all' }}
          SELECTED_BUILD_TYPE: ${{ inputs.build-type || 'all' }}
          SELECTED_ARCH: ${{ inputs.arch || 'x86-64' }}
          RELEASE_TAG_OVERRIDE: ${{ inputs.release-tag || '' }}
          FORCE_REBUILD: ${{ inputs.force-rebuild || false }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          force_args=()
          [[ "$FORCE_REBUILD" != "true" ]] || force_args+=(--force-rebuild)
          matrix=$(python3 .github/scripts/generate_ci_matrix.py \
            --lane binary \
            --slicer "$SELECTED_SLICER" \
            --build-type "$SELECTED_BUILD_TYPE" \
            --arch "$SELECTED_ARCH" \
            --release-tag "$RELEASE_TAG_OVERRIDE" \
            "${force_args[@]}")
          has_publish=$(python3 -c 'import json, sys; print(str(any(row["publish"] for row in json.load(sys.stdin)["include"])).lower())' <<< "$matrix")
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "has_publish=$has_publish" >> "$GITHUB_OUTPUT"

  build_slicers:
    needs: prepare_matrix
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix: ${{ fromJSON(needs.prepare_matrix.outputs.matrix) }}

    runs-on: ${{ matrix.arch == 'arm64' && 'ubicloud-standard-30-arm-ubuntu-2404' || 'ubicloud-standard-30-ubuntu-2404' }}
    env:
      DEPS_CACHE_KEY: ''
      SLICER_CACHE_KEY: ''
      SLICER_RELEASE_TAG: ${{ (matrix.build-type == 'latest_release' || matrix.publish_release) && matrix.release_tag || '' }}
      latest_release_tag: ${{ matrix.release_tag || '' }}
      continue_build: ${{ matrix.skip && 'false' || 'true' }}
      CONSUMER_REBUILD: ${{ matrix.consumer_rebuild && 'true' || 'false' }}
      FORCE_REBUILD: ${{ (inputs.force-rebuild || matrix.consumer_rebuild) && 'true' || 'false' }}
      IS_ARM: ${{ matrix.arch == 'arm64' && 'true' || 'false' }}
      PLATFORM: linux
      ARCH: ${{ matrix.arch }}
      CFLAGS: -ffunction-sections -fdata-sections
      CXXFLAGS: -ffunction-sections -fdata-sections
      LDFLAGS: -Wl,--gc-sections
      CURA_CONAN_CONFIG_REF: ${{ matrix.cura_conan_config_ref || '' }}
    steps:
      - name: Checkout repository
        if: env.continue_build == 'true'
        uses: actions/checkout@v4

      - name: Setup
        if: env.continue_build == 'true'
        run: |
          set -euo pipefail

          git clone https://github.com/${{ matrix.repo }} slicer-src --depth 1 --
          mkdir -p slicer-out
          build_ref_hash="${{ matrix.build_ref }}"
          if [[ ! "$build_ref_hash" =~ ^[0-9a-f]{40,64}$ ]]; then
            echo "Invalid resolved upstream commit: $build_ref_hash" >&2
            exit 1
          fi
          echo "BUILD_REF_HASH=$build_ref_hash" >> "$GITHUB_ENV"
          echo "PATCH_VERSION=${{ matrix.patch_version }}" >> "$GITHUB_ENV"

          cat > slicer-out/config.sh <<EOF
          build_type=${{ matrix.build-type }}
          mark_latest=${{ matrix.mark_latest && 'true' || 'false' }}
          publish_nightly=${{ matrix.publish_nightly && 'true' || 'false' }}
          publish_release=${{ matrix.publish_release && 'true' || 'false' }}
          tag=${{ matrix.release_tag }}
          slicer=${{ matrix.slicer }}
          repo=${{ matrix.repo }}
          upstream_ref=$build_ref_hash
          upstream_published_at=${{ matrix.release_published_at }}
          platform=${{ env.PLATFORM }}
          arch=${{ env.ARCH }}
          created_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          workflow_run_url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF

      - name: Finalize Setup
        if: env.continue_build == 'true'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y xvfb zip

          git -C slicer-src fetch --no-tags --depth 1 origin "$BUILD_REF_HASH"
          git -C slicer-src checkout --detach "$BUILD_REF_HASH"
          actual_ref=$(git -C slicer-src rev-parse HEAD)
          if [[ "$actual_ref" != "$BUILD_REF_HASH" ]]; then
            echo "Checked out $actual_ref, expected $BUILD_REF_HASH" >&2
            exit 1
          fi

      - name: Apply patches
        if: env.continue_build == 'true'
        run: |
          ./tools/apply_versioned_patches.sh \
            "${{ matrix.slicer }}" "$PATCH_VERSION" binary

      - name: Install dependencies
        if: env.continue_build == 'true'
        run: |
          ./slicers/${{ matrix.slicer }}/steps/install-deps.sh

      - name: Compute cache fingerprints
        if: env.continue_build == 'true'
        env:
          ARCH: ${{ env.ARCH }}
        run: |
          set -euo pipefail

          deps_key=$(bash .github/scripts/cache-fingerprint.sh \
            deps slicer-src "${{ matrix.slicer }}" "$PATCH_VERSION" binary)
          export CACHE_DEPS_FINGERPRINT="$deps_key"
          slicer_key=$(bash .github/scripts/cache-fingerprint.sh \
            build slicer-src "${{ matrix.slicer }}" "$PATCH_VERSION" binary)

          echo "DEPS_CACHE_KEY=$deps_key" >> "$GITHUB_ENV"
          echo "SLICER_CACHE_KEY=$slicer_key" >> "$GITHUB_ENV"

      - name: Cache built dependencies
        if: env.continue_build == 'true' && !inputs.disable-caching
        id: cache-build-deps
        uses: actions/cache@v4
        with:
          path: slicer-src/deps/build
          # The content fingerprint includes the upstream dependency inputs and
          # our build recipe. Identical forks can therefore reuse one family
          # cache without allowing unrelated dependency trees to alias.
          key: deps-v3-${{ runner.os }}-${{ matrix.family }}-${{ env.ARCH }}-${{ env.DEPS_CACHE_KEY }}

      - name: Build dependencies
        if: env.continue_build == 'true' && (inputs.disable-caching || steps.cache-build-deps.outputs.cache-hit != 'true')
        run: |
          ./slicers/${{ matrix.slicer }}/steps/build-deps.sh

      - name: Cache built slicer
        if: env.continue_build == 'true' && env.FORCE_REBUILD != 'true' && !inputs.disable-caching
        id: cache-build-slicer
        uses: actions/cache@v4
        with:
          path: slicer-src/build
          key: build-v2-${{ runner.os }}-${{ matrix.slicer }}-${{ env.ARCH }}-${{ env.SLICER_CACHE_KEY }}

      - name: Build slicer
        if: env.continue_build == 'true' && (env.FORCE_REBUILD == 'true' || inputs.disable-caching || steps.cache-build-slicer.outputs.cache-hit != 'true')
        run: |
          ./slicers/${{ matrix.slicer }}/steps/build.sh

      - name: Package binaries
        if: env.continue_build == 'true'
        run: |
          ./slicers/${{ matrix.slicer }}/steps/package-binary.sh
          cd slicer-src/build/slicer_out
          # Preserve SONAME symlinks instead of storing another full ELF for
          # every alias, and include any intentional dotfiles in the bundle.
          zip -yr ../binary.zip .
          cd ../../..

          release_asset_name="${{ matrix.slicer }}-${{ env.latest_release_tag }}-${{ env.PLATFORM }}-${{ env.ARCH }}.zip"
          nightly_asset_name="${{ matrix.slicer }}-${{ env.PLATFORM }}-${{ env.ARCH }}-nightly.zip"
          mv slicer-src/build/binary.zip "slicer-out/${release_asset_name}"
          cp slicer-src/build/slicer-bundle-report.json slicer-out/
          sha256=$(sha256sum "slicer-out/${release_asset_name}" | cut -d' ' -f1)

          cat >> slicer-out/config.sh <<EOF
          sha256=$sha256
          release_asset_name=$release_asset_name
          nightly_asset_name=$nightly_asset_name
          release_url=https://github.com/${{ github.repository }}/releases/download/${{ matrix.slicer }}_${{ env.latest_release_tag }}/${release_asset_name}
          nightly_url=https://github.com/${{ github.repository }}/releases/download/nightly/${nightly_asset_name}
          EOF

      - name: Upload latest release
        if: env.continue_build == 'true' && matrix.publish_release == true
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ matrix.slicer }} ${{ env.latest_release_tag }}
          files: slicer-out/${{ matrix.slicer }}-${{ env.latest_release_tag }}-${{ env.PLATFORM }}-${{ env.ARCH }}.zip
          tag_name: ${{ matrix.slicer }}_${{ env.latest_release_tag }}
          target_commitish: ${{ github.ref_name }}
          body: "Link to workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          make_latest: false
          overwrite_files: true

      - name: Upload nightly release
        if: env.continue_build == 'true' && matrix.publish_nightly == true
        uses: WebFreak001/deploy-nightly@v3.2.0
        with:
          upload_url: https://uploads.github.com/repos/SimplyPrint/slicer-builds/releases/254161481/assets{?name,label}
          release_id: 254161481
          asset_path: slicer-out/${{ matrix.slicer }}-${{ env.latest_release_tag }}-${{ env.PLATFORM }}-${{ env.ARCH }}.zip
          asset_name: ${{ matrix.slicer }}-${{ env.PLATFORM }}-${{ env.ARCH }}-nightly.zip
          asset_content_type: application/zip
          max_releases: 1

      - name: Upload config file
        if: env.continue_build == 'true' && matrix.publish == true
        uses: actions/upload-artifact@v4
        with:
          name: binary-config-${{ matrix.slicer }}-${{ matrix.artifact_key }}-${{ env.ARCH }}
          path: |
            slicer-out/config.sh
            slicer-out/slicer-bundle-report.json

      - name: Upload unpublished binary preview
        if: env.continue_build == 'true' && matrix.publish != true
        uses: actions/upload-artifact@v4
        with:
          name: preview-binary-${{ matrix.slicer }}-${{ matrix.build-type }}-${{ env.ARCH }}
          path: |
            slicer-out/*.zip
            slicer-out/slicer-bundle-report.json

  update_index:
    needs: [prepare_matrix, build_slicers]
    runs-on: ubuntu-24.04
    if: always() && needs.prepare_matrix.outputs.has_publish == 'true' && (needs.build_slicers.result == 'success' || needs.build_slicers.result == 'failure')
    outputs:
      nightly_indexed: ${{ steps.update-build-index.outputs.nightly_indexed }}
    concurrency:
      group: slicer-out-${{ github.ref_name }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Update build index
        id: update-build-index
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          for folder in artifacts/binary-config-*; do
            [[ -d "$folder" ]] || continue
            echo "Begin processing $folder"
            source "$folder/config.sh"

            if [[ "$publish_nightly" == "true" ]]; then
              ./tools/update_slicer_index.py \
                --index "slicers/$slicer/out/_index.json" \
                --version nightly \
                --kind build \
                --platform "$platform" \
                --arch "$arch" \
                --sha256 "$sha256" \
                --url "$nightly_url" \
                --asset-name "$nightly_asset_name" \
                --created-at "$created_at" \
                --upstream-ref "$upstream_ref" \
                --upstream-published-at "$upstream_published_at" \
                --source-repo "$repo" \
                --workflow-run-url "$workflow_run_url"
              echo "nightly_indexed=true" >> "$GITHUB_OUTPUT"
            fi

            if [[ "$publish_release" == "true" ]]; then
              latest_args=()
              [[ "$mark_latest" != "true" ]] || latest_args+=(--latest)
              ./tools/update_slicer_index.py \
                --index "slicers/$slicer/out/_index.json" \
                --version "$tag" \
                --kind build \
                --platform "$platform" \
                --arch "$arch" \
                --sha256 "$sha256" \
                --url "$release_url" \
                --asset-name "$release_asset_name" \
                --created-at "$created_at" \
                --upstream-ref "$upstream_ref" \
                --upstream-published-at "$upstream_published_at" \
                --source-repo "$repo" \
                --workflow-run-url "$workflow_run_url" \
                "${latest_args[@]}"
            fi

            git add "slicers/$slicer/out/_index.json"
            if git diff --cached --quiet; then
              echo "No build index changes for $slicer $arch."
            else
              git commit -m "chore(${slicer,,}): index ${platform}/${arch} build @ ${upstream_ref:0:12}"
            fi
          done

          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

  update_nightly_tag:
    needs: update_index
    if: always() && needs.update_index.result == 'success' && needs.update_index.outputs.nightly_indexed == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Update nightly tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "nightly"
          git push --force --tags origin
